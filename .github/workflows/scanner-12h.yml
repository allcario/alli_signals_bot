name: Scanner 12h

on:
  schedule:
    - cron: "2 0,12 * * *"   # 2 min na elke 12u-sluiting (00:02 en 12:02 UTC)
  workflow_dispatch:

concurrency:
  group: crypto-scanner-12h
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner (12h)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner.py 12h

      - name: Commit updated state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add state.json
          git diff --quiet --cached || git commit -m "Update signal state (12h) [skip ci]"
          git pull --rebase
          git push
