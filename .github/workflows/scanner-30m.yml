name: Scanner 30m

on:
  schedule:
    - cron: "2,32 * * * *"   # 2 min na elke halfuur-sluiting (xx:02 en xx:32 UTC)
  workflow_dispatch:

concurrency:
  group: crypto-scanner-30m
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner (30m)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner.py 30m

      - name: Commit updated state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add state.json
          git diff --quiet --cached || git commit -m "Update signal state (30m) [skip ci]"
          git pull --rebase
          git push
